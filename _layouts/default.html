<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav">
        <div class="nav-content">
            <h1><a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a></h1>
            <nav class="topic-nav">
                <ul id="topic-filters">
                    <li><button class="topic-btn" data-topic="berries">Berries</button></li>
                    <li><button class="topic-btn" data-topic="buildings">Buildings</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="content">
        <div class="type-filters">
            <ul id="type-filters">
                <li><button class="type-btn" data-type="writing">Writing</button></li>
                <li><button class="type-btn" data-type="image">Image</button></li>
                <li><button class="type-btn" data-type="sound">Sound</button></li>
                <li><button class="type-btn" data-type="video">Video</button></li>
            </ul>
        </div>
        {{ content }}
    </main>

    <div id="imageModal" class="modal">
        <button class="modal-close">&times;</button>
        <div class="modal-content"></div>
        <div class="modal-navigation">
            <button class="modal-nav prev">&larr;</button>
            <button class="modal-nav next">&rarr;</button>
        </div>
    </div>

    <script src="{{ '/assets/js/filter.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/modal.js' | relative_url }}"></script>
</body>
</html>
