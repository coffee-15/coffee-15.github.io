<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Field Guide</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav">
        <div class="nav-content">
            <h1><a href="/" class="site-title">My Field Guide</a></h1>
            <nav class="topic-nav">
                <ul id="topic-filters">
                    <li><button class="topic-btn" data-topic="berries">Berries</button></li>
                    <li><button class="topic-btn" data-topic="buildings">Buildings</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="content">
        <div class="type-filters">
            <ul id="type-filters">
                <li><button class="type-btn" data-type="writing">Writing</button></li>
                <li><button class="type-btn" data-type="image">Image</button></li>
                <li><button class="type-btn" data-type="sound">Sound</button></li>
                <li><button class="type-btn" data-type="video">Video</button></li>
            </ul>
        </div>
        <article class="gallery-item" 
         data-topics="buildings"
         data-types="image">
    <div class="gallery-content">
        
        <img src="/assets/images/Old_House.jpg" alt="Old House">
        
    </div>
</article>

<script>
    // Redirect to home page if accessed directly
    if (!document.referrer.includes(window.location.host)) {
        window.location.href = '/';
    }
</script> 
    </main>

    <div id="imageModal" class="modal">
        <button class="modal-close">&times;</button>
        <div class="modal-content"></div>
        <div class="modal-navigation">
            <button class="modal-nav-arrow prev">←</button>
            <button class="modal-nav-arrow next">→</button>
        </div>
    </div>

    <script src="/assets/js/filter.js"></script>
    <script src="/assets/js/modal.js"></script>
</body>
</html>
