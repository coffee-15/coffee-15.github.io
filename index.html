---
layout: default
---

<div class="gallery" id="post-gallery">
    {% for post in site.posts %}
    <a href="#" class="gallery-item-link">
        <article class="gallery-item" 
                 data-topics="{{ post.topics | join: ' ' }}"
                 data-types="{{ post.types | join: ' ' }}"
                 data-description="{{ post.image_description }}"
                 data-date="{{ post.date | date: '%d.%m.%y' }}"
                 data-content="{{ post.content | escape }}">
            <div class="gallery-content">
                {% if post.types contains 'image' %}
                    {% if post.image %}
                    <img src="{{ post.image | relative_url }}" alt="{{ post.title }}">
                    {% endif %}
                {% else %}
                    <h2>{{ post.title }}</h2>
                    <p>{{ post.excerpt }}</p>
                {% endif %}
            </div>
        </article>
    </a>
    {% endfor %}
</div>
